<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Galeri Noken Papua</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a0f02; overflow: hidden; }

    /* Unity container */
    #unity-container { position: absolute; }
    #unity-container.unity-desktop { left: 50%; top: 50%; transform: translate(-50%, -50%); }
    #unity-container.unity-mobile { position: fixed; width: 100%; height: 100%; }
    #unity-canvas { background: #231F20; }
    .unity-mobile #unity-canvas { width: 100%; height: 100%; }
    #unity-loading-bar { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; }
    #unity-logo { width: 154px; height: 130px; background: url('TemplateData/unity-logo-dark.png') no-repeat center; }
    #unity-progress-bar-empty { width: 141px; height: 18px; margin-top: 10px; margin-left: 6.5px; background: url('TemplateData/progress-bar-empty-dark.png') no-repeat center; }
    #unity-progress-bar-full { width: 0%; height: 18px; margin-top: 10px; background: url('TemplateData/progress-bar-full-dark.png') no-repeat center; }
    #unity-footer { position: relative; }
    .unity-mobile #unity-footer { display: none; }
    #unity-build-title { float: right; margin-right: 10px; line-height: 38px; font-family: arial; font-size: 18px; color: #ccc; }
    #unity-fullscreen-button { cursor: pointer; float: right; width: 38px; height: 38px; background: url('TemplateData/fullscreen-button.png') no-repeat center; }
    #unity-warning { position: absolute; left: 50%; top: 5%; transform: translate(-50%); background: white; padding: 10px; display: none; }

    /* ─── Mobile preload splash ─── */
    #preload-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(160deg, #2a1505 0%, #1a0a02 50%, #0d0501 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: white; font-family: Georgia, serif;
      padding: 24px;
    }
    #preload-screen h1 {
      font-size: clamp(20px, 5vw, 34px);
      color: #d4a843;
      text-align: center;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(212,168,67,0.4);
    }
    #preload-screen .subtitle {
      font-size: clamp(11px, 2.5vw, 15px);
      color: #a07830;
      margin-top: 6px;
      letter-spacing: 2px;
    }
    .ornament { color: #d4a843; font-size: 20px; margin: 18px 0; opacity: 0.5; }
    #tap-btn {
      margin-top: 20px;
      padding: 14px 44px;
      background: transparent;
      border: 2px solid #d4a843;
      color: #d4a843;
      font-family: Georgia, serif;
      font-size: clamp(13px, 3vw, 17px);
      letter-spacing: 3px;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.3s;
    }
    #tap-btn:active { background: rgba(212,168,67,0.2); }
    #tap-btn:disabled { opacity: 0.45; cursor: default; }

    #progress-area {
      margin-top: 22px; text-align: center;
      display: flex; flex-direction: column; align-items: center;
      min-height: 50px;
    }
    #dl-bar-bg {
      width: min(300px, 72vw); height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px; overflow: hidden; margin-bottom: 8px;
    }
    #dl-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #a07830, #d4a843);
      border-radius: 2px;
      transition: width 0.25s ease;
    }
    #dl-status {
      font-size: clamp(10px, 2vw, 13px);
      color: #a07830; letter-spacing: 1px;
    }
    #retry-btn {
      margin-top: 14px;
      padding: 8px 26px;
      background: transparent;
      border: 1px solid #c0392b;
      color: #c0392b;
      font-family: Georgia, serif;
      font-size: 13px;
      cursor: pointer;
      display: none;
    }
  </style>
</head>
<body>

  <!-- Mobile preload splash (hidden on desktop) -->
  <div id="preload-screen" style="display:none">
    <h1>Galeri Noken Papua</h1>
    <p class="subtitle">Virtual Cultural Museum</p>
    <div class="ornament">✦ ✦ ✦</div>
    <button id="tap-btn">TAP TO LOAD</button>
    <div id="progress-area">
      <div id="dl-bar-bg"><div id="dl-bar-fill"></div></div>
      <div id="dl-status"></div>
      <button id="retry-btn">RETRY</button>
    </div>
  </div>

  <!-- Unity -->
  <div id="unity-container" class="unity-desktop" style="display:none">
    <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div id="unity-logo"></div>
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
    <div id="unity-warning"></div>
    <div id="unity-footer">
      <div id="unity-fullscreen-button"></div>
      <div id="unity-build-title">Papua Showcase Museum</div>
    </div>
  </div>

  <script>
    var canvas = document.querySelector("#unity-canvas");
    var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    var buildUrl = "Build";
    var loaderUrl = buildUrl + "/webgl-build.loader.js";
    var config = {
      dataUrl:      buildUrl + "/webgl-build.data.unityweb",
      frameworkUrl: buildUrl + "/webgl-build.framework.js.unityweb",
      codeUrl:      buildUrl + "/webgl-build.wasm.unityweb",
      streamingAssetsUrl: "StreamingAssets",
      companyName:    "Papua Showcase",
      productName:    "Papua Showcase Museum",
      productVersion: "0.1",
      showBanner: unityShowBanner,
    };

    function unityShowBanner(msg, type) {
      var banner = document.querySelector("#unity-warning");
      function refresh() { banner.style.display = banner.children.length ? 'block' : 'none'; }
      var div = document.createElement('div');
      div.innerHTML = msg;
      banner.appendChild(div);
      if (type === 'error') {
        div.style = 'background:red;padding:10px;';
      } else {
        if (type === 'warning') div.style = 'background:yellow;padding:10px;';
        setTimeout(function() { banner.removeChild(div); refresh(); }, 5000);
      }
      refresh();
    }

    function launchUnity() {
      var container = document.getElementById('unity-container');
      container.style.display = '';

      if (isMobile) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.head.appendChild(meta);
        container.className = 'unity-mobile';
        canvas.className = 'unity-mobile';
        config.devicePixelRatio = 1;
      } else {
        canvas.style.width  = "1920px";
        canvas.style.height = "1080px";
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function() {
        createUnityInstance(canvas, config, function(progress) {
          document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
        }).then(function(unityInstance) {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = function() {
            unityInstance.SetFullscreen(1);
          };
        }).catch(function(message) {
          alert(message);
        });
      };
      document.body.appendChild(script);
    }

    /* ── MOBILE: preload first, then launch ── */
    if (isMobile) {
      document.getElementById('preload-screen').style.display = 'flex';

      var filesToPreload = [
        loaderUrl,
        config.dataUrl,
        config.frameworkUrl,
        config.codeUrl
      ];
      // Approximate file sizes in bytes for progress display
      var fileSizes = [0.11 * 1048576, 27 * 1048576, 0.08 * 1048576, 11 * 1048576];
      var totalBytes   = fileSizes.reduce(function(a, b) { return a + b; }, 0);
      var loadedPerFile = [0, 0, 0, 0];
      var completedFiles = 0;
      var downloadActive = false;
      var downloadDone   = false;

      var tapBtn    = document.getElementById('tap-btn');
      var dlStatus  = document.getElementById('dl-status');
      var dlBarFill = document.getElementById('dl-bar-fill');
      var retryBtn  = document.getElementById('retry-btn');

      function updateBar() {
        var loaded = loadedPerFile.reduce(function(a, b) { return a + b; }, 0);
        var pct = Math.min(100, (loaded / totalBytes) * 100);
        dlBarFill.style.width = pct + '%';
        var dlMB    = (loaded / 1048576).toFixed(1);
        var totalMB = (totalBytes / 1048576).toFixed(0);
        dlStatus.textContent = dlMB + ' MB / ' + totalMB + ' MB';
      }

      function onAllDone() {
        downloadDone = true;
        dlBarFill.style.width = '100%';
        dlStatus.textContent  = 'Download complete!';
        tapBtn.disabled = false;
        tapBtn.textContent = 'TAP TO START';
        tapBtn.onclick = function() {
          document.getElementById('preload-screen').style.display = 'none';
          launchUnity();
        };
      }

      function onFetchError() {
        dlStatus.textContent = 'Download failed. Check your connection.';
        retryBtn.style.display = 'block';
        tapBtn.disabled = false;
        tapBtn.textContent = 'TAP TO LOAD';
        downloadActive = false;
      }

      retryBtn.addEventListener('click', function() {
        retryBtn.style.display = 'none';
        loadedPerFile = [0, 0, 0, 0];
        completedFiles = 0;
        dlBarFill.style.width = '0%';
        dlStatus.textContent = '';
        startDownload();
      });

      function startDownload() {
        downloadActive = true;
        tapBtn.disabled = true;
        tapBtn.textContent = 'LOADING...';
        dlStatus.textContent = 'Starting download...';

        var failed = false;

        filesToPreload.forEach(function(url, i) {
          fetch(url)
            .then(function(response) {
              if (!response.ok) throw new Error('HTTP ' + response.status);
              var reader = response.body.getReader();
              function pump() {
                return reader.read().then(function(result) {
                  if (result.done) {
                    completedFiles++;
                    if (completedFiles === filesToPreload.length) onAllDone();
                    return;
                  }
                  loadedPerFile[i] += result.value.length;
                  updateBar();
                  return pump();
                });
              }
              return pump();
            })
            .catch(function() {
              if (!failed) { failed = true; onFetchError(); }
            });
        });
      }

      tapBtn.addEventListener('click', function() {
        if (downloadActive || downloadDone) return;
        startDownload();
      });

    } else {
      /* ── DESKTOP: launch immediately ── */
      launchUnity();
    }
  </script>
</body>
</html>
